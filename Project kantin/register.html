<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="register.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <main class="register-container">

        <section class="register-image">

            <img src="assets/login-food.png" alt="Food">

            <div class="overlay">

                <h1>
                    BERGABUNG & MULAI MEMESAN <br>
                </h1>

                <p>
                    Daftarkan akunmu untuk menikmati layanan kami
                </p>

            </div>

        </section>

        <section class="register-form-section">

            <h2>REGISTER</h2>

            <form class="register-form">

                <input type="text" placeholder="Nama" required>

                <input type="email" placeholder="Email" required>

                <div class="password-wrapper">

                    <input type="password" placeholder="Password" id="password" required>

                    <i class="fa-regular fa-eye" id="togglePassword"></i>

                </div>

                <div class="password-wrapper">

                    <input type="password" placeholder="Konfirmasi Password" id="confirmPassword" required>

                    <i class="fa-regular fa-eye" id="toggleConfirm"></i>

                </div>

                <button type="submit">
                    Register
                </button>

                <p class="login-text">
                    Sudah punya akun?
                    <a href="login.html">Login</a>
                </p>

            </form>

        </section>

    </main>
    <footer class="footer">
        <p>© 2026 Food Order App</p>
    </footer>

    <script src="register.js"></script>

</body>

</html>
