<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>

    <!-- CSS -->
    <link rel="stylesheet" href="admin.css">

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="desktop-only">
            <i class="fas fa-bars"></i>
        </div>

    <nav>
        <ul class="menu">

            <!-- DASHBOARD ADMIN -->
            <li class="active">
                <a href="admin.html">

                    <i class="fas fa-chart-line"></i>

                    <span>
                        Dashboard Admin
                    </span>

                </a>
            </li>

            <!-- PROFIL -->
            <li>
                <a href="profile.html">

                    <i class="fas fa-user"></i>

                    <span>
                        Profil
                    </span>

                </a>
            </li>

            <!-- LOGOUT -->
            <li>
                <a href="login.html">

                    <i class="fas fa-right-from-bracket"></i>

                    <span>
                        Logout
                    </span>

                </a>
            </li>

        </ul>
    </nav>

</aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- HEADER -->
        <header class="top-header">

            <div class="header-left">
                <i class="fas fa-bars"></i>
            </div>

            <h1>DASHBOARD ADMIN</h1>

        </header>

        <!-- CONTENT -->
        <section class="dashboard-content">

            <!-- CARD STATISTIK -->
            <section class="stats-grid">

                <div class="card stat-card">
                    <p>Total Penjual</p>
                    <h2 class="stat-number">12</h2>
                </div>

                <div class="card stat-card">
                    <p>Total Pesanan</p>
                    <h2 class="stat-number">248</h2>
                </div>

                <div class="card stat-card">
                    <p>Total Pendapatan</p>

                    <div class="income-wrapper">
                        <i class="fas fa-coins coin-icon"></i>
                        <h2 class="income-text">
                            Rp 12,5 Jt
                        </h2>
                    </div>
                </div>

            </section>

            <!-- AKTIVITAS -->
            <section class="table-section">
                <div class="card">
                    <h3>Aktivitas Penjualan</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Nama Penjual</th>
                                    <th>Total Pesanan</th>
                                    <th>Status</th>
                                </tr>
                            </thead>

                            <tbody>

                                <tr>
                                    <td>Warung Nusantara</td>
                                    <td>58</td>
                                    <td>
                                        <span class="badge aktif">
                                            Aktif
                                        </span>
                                    </td>
                                </tr>

                                <tr>
                                    <td>Kedai Rasa</td>
                                    <td>41</td>
                                    <td>
                                        <span class="badge aktif">
                                            Aktif
                                        </span>
                                    </td>
                                </tr>

                                <tr>
                                    <td>Dapur Kita</td>
                                    <td>22</td>
                                    <td>
                                        <span class="badge nonaktif">
                                            Nonaktif
                                        </span>
                                    </td>
                                </tr>

                            </tbody>

                        </table>

                    </div>
                </div>
            </section>

        </section>

        <footer class="footer">
            <p>© 2026 Food Order App</p>
        </footer>

    </main>

    <!-- MOBILE NAVBAR -->
    <nav class="mobile-navbar">
    <a href="admin.html" class="active-mobile">
        <i class="fa-solid fa-chart-line"></i>
    </a>

    <a href="profile.html">
        <i class="fa-solid fa-user"></i>
    </a>

    <a href="login.html">
        <i class="fa-solid fa-right-from-bracket"></i>
    </a>

</nav>

    <!-- JS -->
    <script src="admin.js"></script>

</body>
</html>
