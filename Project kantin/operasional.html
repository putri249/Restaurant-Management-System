<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operasional</title>

    <!-- CSS -->
    <link rel="stylesheet" href="operasional.css">

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="desktop-only">
            <i class="fas fa-bars"></i>
        </div>

        <nav>
            <ul class="menu">

                <li>
                    <a href="dashboard.html">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>

                <li>
                    <a href="#">
                        <i class="fas fa-utensils"></i>
                        <span>Menu Utama</span>
                    </a>
                </li>

                <li class="active">
                    <a href="operasional.html">
                        <i class="fas fa-briefcase"></i>
                        <span>Operasional</span>
                    </a>
                </li>

                <li>
                    <a href="pesanan.html">
                        <i class="fas fa-clipboard-list"></i>
                        <span>Pesanan</span>
                    </a>
                </li>

                <li>
                    <a href="profile.html">
                        <i class="fas fa-user"></i>
                        <span>Profil</span>
                    </a>
                </li>

            </ul>
        </nav>
    </aside>


    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- HEADER -->
        <header class="top-header">

            <div class="header-left">
                <i class="fas fa-bars"></i>
            </div>

            <h1>OPERASIONAL</h1>

        </header>


        <!-- CONTENT -->
        <section class="operational-content">

            <!-- FORM -->
            <div class="form-card">

                <h2>Tambah Pesanan</h2>

                <form id="orderForm" novalidate>

                    <div class="input-group">
                        <label>Nama Pembeli</label>

                        <input type="text" id="customerName" placeholder="Masukkan nama pembeli" autocomplete="off">
                    </div>

                    <div class="input-group">
                        <label>Pilih Menu</label>

                        <select id="menuSelect">
                            <option value="">Pilih Menu</option>
                            <option value="Nasi Goreng">Nasi Goreng</option>
                            <option value="Soto Ayam">Soto Ayam</option>
                            <option value="Mie Ayam">Mie Ayam</option>
                            <option value="Bakso">Bakso</option>
                            <option value="Es Teh">Es Teh</option>
                            <option value="Es Jeruk">Es Jeruk</option>
                            <option value="Air Putih">Air Putih</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Jumlah</label>

                        <input type="number" id="jumlah" placeholder="Masukkan jumlah" min="1" step="1" required>
                    </div>

                    <button type="submit" class="submit-btn">
                        Tambah Pesanan
                    </button>

                </form>

            </div>


            <!-- TABLE -->
            <div class="table-card">

                <div class="table-header">
                    <h2>Data Pesanan</h2>

                    <div class="table-count">
                        <i class="fas fa-receipt"></i>
                        <span id="totalOrder">2 Pesanan</span>
                    </div>
                </div>

                <div class="table-wrapper">

                    <table>

                        <thead>
                            <tr>
                                <th>Nama</th>
                                <th>Menu</th>
                                <th>Jumlah</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>

                        <tbody id="orderTableBody">

                        </tbody>

                    </table>

                </div>

            </div>

        </section>

        <footer class="footer">
            <p>© 2026 Food Order App</p>
        </footer>

    </main>


    <!-- MOBILE NAVBAR -->
    <nav class="mobile-navbar">

        <a href="dashboard.html">
            <i class="fa-solid fa-house"></i>
        </a>

        <a href="menu.html">
            <i class="fa-solid fa-utensils"></i>
        </a>

        <a href="operasional.html" class="active-mobile">
            <i class="fa-solid fa-briefcase"></i>
        </a>

        <a href="pesanan.html">
            <i class="fa-regular fa-clipboard"></i>
        </a>

        <a href="profile.html">
            <i class="fa-solid fa-user"></i>
        </a>

    </nav>

    <!-- JS -->
    <script src="operasional.js"></script>

</body>

</html>
